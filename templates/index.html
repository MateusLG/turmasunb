<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TurmasUnB — {{ semester }}</title>
  <meta property="og:title" content="TurmasUnB" />
  <meta property="og:description" content="Encontre o link do grupo da sua turma na UnB" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://turmasunb.com" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #003F72;
      --blue-mid: #005299;
      --blue-light: #e8f0f8;
      --green: #00A859;
      --green-light: #e6f7ee;
      --bg: #F0F2F5;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background: var(--blue);
      height: 54px;
      display: flex;
      align-items: center;
      padding: 0 1.75rem;
    }
    nav .brand {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0.95;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes logoPulse {
      0%, 100% { opacity: 0.8; }
      50%       { opacity: 1; }
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue-mid) 100%);
      padding: 2.5rem 1.5rem 4.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 48px;
      background: var(--bg);
      border-radius: 40px 40px 0 0;
    }
    .hero-logo {
      display: block;
      margin: 0 auto 1.5rem;
      animation: fadeUp 0.6s ease both, logoPulse 4s ease-in-out 1s infinite;
    }
    .hero h1 {
      color: #fff;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
      animation: fadeUp 0.6s ease 0.1s both;
    }
    .hero p {
      color: rgba(255,255,255,0.65);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    /* ── Search wrapper ── */
    .search-wrap {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
      animation: fadeUp 0.6s ease 0.3s both;
    }
    .search-wrap svg.icon-search {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      outline: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      transition: box-shadow 0.2s;
    }
    #search:focus {
      box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 0 3px rgba(0,168,89,0.25);
    }
    #search::placeholder { color: #94a3b8; }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 1.75rem 1rem 2rem;
    }

    /* ── Result count ── */
    #result-count {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      font-weight: 500;
      display: none;
    }

    /* ── States ── */
    .state-msg {
      text-align: center;
      padding: 2.5rem 0 3rem;
      color: #cbd5e1;
    }
    .state-msg svg { display: block; margin: 0 auto 1rem; }
    .state-msg p { font-size: 0.85rem; color: #94a3b8; }

    /* ── Empty state: pills de sugestão ── */
    #empty-state {
      text-align: center;
      padding: 2.5rem 0 3rem;
    }
    .suggestions-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #b0bec5;
      margin-bottom: 0.85rem;
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.38rem 0.9rem;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: inherit;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.1s;
    }
    .pill:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-light);
    }
    .pill:active { transform: scale(0.96); }
    .empty-count {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .empty-count strong { color: var(--text-muted); font-weight: 600; }

    .hidden { display: none !important; }

    /* ── Results ── */
    #results { display: flex; flex-direction: column; gap: 0.625rem; }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-left: 3px solid transparent;
      padding: 1rem 1.1rem;
      transition: box-shadow 0.18s, transform 0.18s, border-left-color 0.2s;
    }
    .card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }
    .card.has-link { border-left-color: var(--green); }

    .card-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.7rem;
    }
    .card-info .materia {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.15rem;
    }
    .card-info .professor {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .card-badges { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .badge {
      font-size: 0.68rem;
      font-weight: 500;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge-turma {
      background: var(--blue-light);
      color: var(--blue);
    }
    .badge-horario {
      background: var(--green-light);
      color: #00703b;
    }

    .card-actions { display: flex; gap: 0.5rem; align-items: center; }
    .link-input {
      flex: 1;
      min-width: 0;
      padding: 0.42rem 0.7rem;
      font-size: 0.78rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #f8fafc;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .link-input:focus {
      border-color: var(--blue);
      background: #fff;
    }
    .link-input::placeholder { color: #b8c0cc; }

    .btn {
      padding: 0.4rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 7px;
      cursor: pointer;
      border: 1.5px solid transparent;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: opacity 0.15s, transform 0.1s, background 0.2s, color 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-save {
      background: transparent;
      border-color: var(--blue);
      color: var(--blue);
    }
    .btn-save:hover { background: var(--blue-light); }
    .btn-save.saved {
      background: var(--green-light);
      border-color: var(--green);
      color: #00703b;
    }
    .btn-enter {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }
    .btn-enter:hover { opacity: 0.88; }

    /* ── Footer ── */
    footer {
      background: #fff;
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #94a3b8;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.4rem 1rem;
    }
    footer a { color: #64748b; text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--blue); }
    footer .sep { color: #e2e8f0; }

    /* ── Ver mais ── */
    .ver-mais-btn {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .ver-mais-btn:hover { background: var(--blue-light); color: var(--blue); }
  </style>
</head>
<body>

  <nav>
    <span class="brand">TurmasUnB {{ semester }}</span>
  </nav>

  <div class="hero">
    <!-- Símbolo da UnB — paths reais (Wikimedia Commons, domínio público) -->
    <svg class="hero-logo" width="120" height="60" viewBox="7 7 634 317" xmlns="http://www.w3.org/2000/svg" aria-label="Símbolo da Universidade de Brasília">
      <path fill="white" opacity="0.95" d="m 543.63956,122.52025 c -31.99939,23.06828 -66.98325,43.06013 -104.68075,59.36796 -18.62882,8.05762 -38.70764,13.629 -59.85377,16.27428 -15.03676,1.87867 -30.34934,2.82421 -45.88061,2.82421 l 0,123.26981 308.17389,0 0,-272.32649 -97.75007,70.60017 -0.009,-0.01"/>
      <path fill="white" opacity="0.95" d="m 105.18666,122.52025 c 32.00957,23.06828 66.98846,43.06013 104.69093,59.36796 18.63255,8.05762 38.70143,13.629 59.8575,16.27428 15.02681,1.87867 30.3394,2.82421 45.88061,2.82421 l 0,123.26981 -308.1838357,0 0,-272.32649 97.7499457,70.60017 0.005,-0.01"/>
      <path fill="white" opacity="0.65" d="m 333.22443,7.27328 0,176.09972 c 14.78825,0 29.37894,-0.912 43.69132,-2.6838 l 0,0 c 19.4526,-2.43655 37.9112,-7.5569 55.04405,-14.96345 36.51712,-15.79343 70.37528,-35.14415 101.36575,-57.48929 l 0,0.005 108.07277,-78.05021 0,-22.91794 -308.17389,0"/>
      <path fill="white" opacity="0.65" d="m 315.6157,7.27328 0,176.09972 c -14.80316,0 -29.3777,-0.912 -43.69132,-2.6838 l -0.005,0 c -19.45757,-2.43655 -37.9199,-7.5569 -55.05275,-14.96345 -36.50842,-15.79343 -70.36658,-35.14415 -101.36625,-57.48929 l 0,0.005 -108.0685457,-78.05021 0,-22.91794 308.1838357,0"/>
    </svg>
    <h1>Encontre sua turma</h1>
    <p>Busque por matéria, professor, código ou horário</p>
    <div class="search-wrap">
      <svg class="icon-search" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="search"
        type="text"
        placeholder="Ex: Cálculo, Matemática Discreta, Sergio..."
        autofocus
      />
    </div>
  </div>

  <main>
    <div id="result-count"></div>

    <div id="empty-state">
      <p class="suggestions-label">Sugestões de busca</p>
      <div class="pills">
        <button class="pill" data-q="Cálculo">Cálculo</button>
        <button class="pill" data-q="Programação">Programação</button>
        <button class="pill" data-q="Física">Física</button>
        <button class="pill" data-q="Química">Química</button>
        <button class="pill" data-q="Administração">Administração</button>
        <button class="pill" data-q="Estatística">Estatística</button>
        <button class="pill" data-q="Direito">Direito</button>
        <button class="pill" data-q="Inglês">Inglês</button>
        <button class="pill" data-q="Economia">Economia</button>
        <button class="pill" data-q="Biologia">Biologia</button>
      </div>
      <p class="empty-count">ou busque entre <strong id="total-count">…</strong> turmas da UnB</p>
    </div>

    <div id="no-results" class="state-msg hidden">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <p>Nenhuma turma encontrada.</p>
    </div>

    <div id="results"></div>
  </main>

  <footer>
    <span>Feito por <a href="https://github.com/MateusLG" target="_blank">LG_Mateus</a></span>
    <span class="sep">|</span>
    <a href="https://github.com/MateusLG/turmasunb" target="_blank">GitHub</a>
    <span class="sep">|</span>
    <a href="/json">API JSON</a>
    <span class="sep">|</span>
    <a href="/stats">Stats</a>
    <span class="sep">|</span>
    <a href="/sobre">Sobre</a>
  </footer>

  <template id="card-template">
    <div class="card">
      <div class="card-top">
        <div class="card-info">
          <p class="materia"></p>
          <p class="professor"></p>
        </div>
        <div class="card-badges">
          <span class="badge badge-turma turma"></span>
          <span class="badge badge-horario horario"></span>
        </div>
      </div>
      <div class="card-actions">
        <input type="text" class="link-input" placeholder="Link da turma (Meet, Teams…)" maxlength="2048" />
        <button class="btn btn-save save-btn">Salvar</button>
        <a class="btn btn-enter enter-btn hidden" target="_blank" rel="noopener noreferrer">Entrar</a>
      </div>
    </div>
  </template>

  <script>
    let allTurmas = [];

    async function loadTurmas() {
      const res = await fetch('/json');
      allTurmas = await res.json();
      document.getElementById('total-count').textContent = allTurmas.length.toLocaleString('pt-BR');
    }

    // fix 1 e 3: aceita apenas http/https para evitar javascript: e outros esquemas
    function isValidLink(url) {
      return url.startsWith('http://') || url.startsWith('https://');
    }

    function normalize(str) {
      return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function renderCard(item) {
      const tmpl = document.getElementById('card-template').content.cloneNode(true);
      const card = tmpl.querySelector('.card');

      card.querySelector('.materia').textContent = item.materia;
      card.querySelector('.professor').textContent = item.professor;
      card.querySelector('.turma').textContent = 'Turma ' + item.turma;
      card.querySelector('.horario').textContent = item.horario;

      const linkInput = card.querySelector('.link-input');
      const enterBtn  = card.querySelector('.enter-btn');
      const saveBtn   = card.querySelector('.save-btn');

      linkInput.value = item.link || '';

      if (item.link) {
        enterBtn.href = item.link;
        enterBtn.classList.remove('hidden');
        card.classList.add('has-link');
      }

      linkInput.addEventListener('input', () => {
        const val = linkInput.value.trim();
        // fix 1: só seta href se for http/https — bloqueia javascript: e similares
        if (val && isValidLink(val)) {
          enterBtn.href = val;
          enterBtn.classList.remove('hidden');
        } else {
          enterBtn.classList.add('hidden');
        }
      });

      saveBtn.addEventListener('click', async () => {
        const link = linkInput.value.trim();

        // Valida antes de enviar
        if (!isValidLink(link)) {
          saveBtn.textContent = 'Link inválido';
          saveBtn.style.borderColor = '#e53e3e';
          saveBtn.style.color = '#e53e3e';
          setTimeout(() => {
            saveBtn.textContent = 'Salvar';
            saveBtn.style.borderColor = '';
            saveBtn.style.color = '';
          }, 2000);
          return;
        }

        // Confirmação ao substituir link existente
        if (item.link && item.link !== link) {
          if (!confirm('Esta turma já tem um link. Deseja substituir?')) return;
        }

        const body = new URLSearchParams({ materia: item.materia, turma: item.turma, link });
        const res = await fetch('/', { method: 'POST', body });
        const data = await res.json();

        if (!res.ok || !data.ok) {
          saveBtn.textContent = data.erro || 'Erro ao salvar';
          saveBtn.style.borderColor = '#e53e3e';
          saveBtn.style.color = '#e53e3e';
          setTimeout(() => {
            saveBtn.textContent = 'Salvar';
            saveBtn.style.borderColor = '';
            saveBtn.style.color = '';
          }, 2000);
          return;
        }

        item.link = link;
        card.classList.add('has-link');
        saveBtn.textContent = '✓ Salvo!';
        saveBtn.classList.add('saved');
        setTimeout(() => {
          saveBtn.textContent = 'Salvar';
          saveBtn.classList.remove('saved');
        }, 2000);
      });

      return card;
    }

    const PAGE_SIZE = 30;
    let currentFiltered = [];
    let shownCount = 0;

    function appendVerMaisBtn() {
      document.getElementById('ver-mais-btn')?.remove();
      const remaining = currentFiltered.length - shownCount;
      if (remaining <= 0) return;
      const btn = document.createElement('button');
      btn.id = 'ver-mais-btn';
      btn.className = 'ver-mais-btn';
      btn.textContent = `Ver mais ${remaining.toLocaleString('pt-BR')} turma${remaining !== 1 ? 's' : ''}`;
      btn.addEventListener('click', () => {
        const results = document.getElementById('results');
        const batch = currentFiltered.slice(shownCount, shownCount + PAGE_SIZE);
        batch.forEach(item => results.appendChild(renderCard(item)));
        shownCount += batch.length;
        appendVerMaisBtn();
      });
      document.getElementById('results').after(btn);
    }

    function search(query) {
      const emptyState  = document.getElementById('empty-state');
      const noResults   = document.getElementById('no-results');
      const results     = document.getElementById('results');
      const resultCount = document.getElementById('result-count');

      document.getElementById('ver-mais-btn')?.remove();

      if (!query.trim()) {
        emptyState.classList.remove('hidden');
        noResults.classList.add('hidden');
        results.innerHTML = '';
        resultCount.style.display = 'none';
        return;
      }

      const q = normalize(query);
      currentFiltered = allTurmas.filter(t =>
        normalize(t.materia).includes(q)   ||
        normalize(t.professor).includes(q) ||
        normalize(t.turma).includes(q)     ||
        normalize(t.horario).includes(q)   ||
        normalize(t.unidade || '').includes(q)
      );

      emptyState.classList.add('hidden');
      results.innerHTML = '';
      shownCount = 0;

      if (currentFiltered.length === 0) {
        noResults.classList.remove('hidden');
        resultCount.style.display = 'none';
        return;
      }

      noResults.classList.add('hidden');
      resultCount.style.display = 'block';
      resultCount.textContent = currentFiltered.length === 1
        ? '1 turma encontrada'
        : `${currentFiltered.length.toLocaleString('pt-BR')} turmas encontradas`;

      const batch = currentFiltered.slice(0, PAGE_SIZE);
      batch.forEach(item => results.appendChild(renderCard(item)));
      shownCount = batch.length;
      appendVerMaisBtn();
    }

    let debounceTimer;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => search(e.target.value), 200);
    });

    document.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const q = pill.dataset.q;
        const input = document.getElementById('search');
        input.value = q;
        input.focus();
        search(q);
      });
    });

    loadTurmas();
  </script>

</body>
</html>
