<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turmas UnB 2026.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #003F72;
      --blue-mid: #005299;
      --blue-light: #e8f0f8;
      --green: #00A859;
      --green-light: #e6f7ee;
      --bg: #F0F2F5;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background: var(--blue);
      height: 54px;
      display: flex;
      align-items: center;
      padding: 0 1.75rem;
    }
    nav .brand {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0.95;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes logoPulse {
      0%, 100% { opacity: 0.82; }
      50%       { opacity: 1; }
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-mid) 100%);
      padding: 2.5rem 1.5rem 4.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 48px;
      background: var(--bg);
      border-radius: 40px 40px 0 0;
    }
    .hero-logo {
      display: block;
      margin: 0 auto 1.5rem;
      width: 160px;
      height: auto;
      filter: grayscale(1) brightness(1.6) invert(1);
      mix-blend-mode: screen;
      animation: fadeUp 0.6s ease both, logoPulse 4s ease-in-out 1s infinite;
    }
    .hero h1 {
      color: #fff;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
      animation: fadeUp 0.6s ease 0.1s both;
    }
    .hero p {
      color: rgba(255,255,255,0.65);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s ease 0.2s both;
    }
    .search-wrap { animation: fadeUp 0.6s ease 0.3s both; }

    /* ── Search wrapper ── */
    .search-wrap {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }
    .search-wrap svg.icon-search {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      outline: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      transition: box-shadow 0.2s;
    }
    #search:focus {
      box-shadow: 0 4px 24px rgba(0,0,0,0.15), 0 0 0 3px rgba(0,168,89,0.25);
    }
    #search::placeholder { color: #94a3b8; }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 1.75rem 1rem 2rem;
    }

    /* ── Result count ── */
    #result-count {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      font-weight: 500;
      display: none;
    }

    /* ── States ── */
    .state-msg {
      text-align: center;
      padding: 3.5rem 0;
      color: #cbd5e1;
    }
    .state-msg svg { display: block; margin: 0 auto 1rem; }
    .state-msg p { font-size: 0.85rem; color: #94a3b8; }

    /* ── Results ── */
    #results { display: flex; flex-direction: column; gap: 0.625rem; }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-left: 3px solid transparent;
      padding: 1rem 1.1rem;
      transition: box-shadow 0.18s, transform 0.18s, border-left-color 0.2s;
    }
    .card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }
    .card.has-link { border-left-color: var(--green); }

    .card-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.7rem;
    }
    .card-info .materia {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.15rem;
    }
    .card-info .professor {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .card-badges { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .badge {
      font-size: 0.68rem;
      font-weight: 500;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge-turma {
      background: var(--blue-light);
      color: var(--blue);
    }
    .badge-horario {
      background: var(--green-light);
      color: #00703b;
    }

    .card-actions { display: flex; gap: 0.5rem; align-items: center; }
    .link-input {
      flex: 1;
      min-width: 0;
      padding: 0.42rem 0.7rem;
      font-size: 0.78rem;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #f8fafc;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .link-input:focus {
      border-color: var(--blue);
      background: #fff;
    }
    .link-input::placeholder { color: #b8c0cc; }

    .btn {
      padding: 0.4rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 7px;
      cursor: pointer;
      border: 1.5px solid transparent;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-save {
      background: transparent;
      border-color: var(--blue);
      color: var(--blue);
    }
    .btn-save:hover { background: var(--blue-light); }
    .btn-enter {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }
    .btn-enter:hover { opacity: 0.88; }

    /* ── Footer ── */
    footer {
      background: #fff;
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #94a3b8;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.4rem 1rem;
    }
    footer a { color: #64748b; text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--blue); }
    footer .sep { color: #e2e8f0; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav>
    <span class="brand">Turmas UnB 2026.1</span>
  </nav>

  <div class="hero">
    <img
      class="hero-logo"
      src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Webysther_20160322_-_Logo_UnB_%28sem_texto%29.svg"
      alt="Logo da Universidade de Brasília"
      width="160"
    />
    <h1>Encontre sua turma</h1>
    <p>Busque por matéria, professor, código ou horário</p>
    <div class="search-wrap">
      <svg class="icon-search" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="search"
        type="text"
        placeholder="Ex: Cálculo, Matemática Discreta, Sergio..."
        autofocus
      />
    </div>
  </div>

  <main>
    <div id="result-count"></div>

    <div id="empty-state" class="state-msg">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <p>Digite para buscar entre <strong>6.478 turmas</strong> da UnB</p>
    </div>

    <div id="no-results" class="state-msg hidden">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <p>Nenhuma turma encontrada.</p>
    </div>

    <div id="results"></div>
  </main>

  <footer>
    <span>Feito por <a href="https://github.com/MateusLG" target="_blank">LG_Mateus</a></span>
    <span class="sep">|</span>
    <a href="https://github.com/MateusLG/turmasunb" target="_blank">GitHub</a>
    <span class="sep">|</span>
    <a href="/json">API JSON</a>
    <span class="sep">|</span>
    <span>Logo: <a href="https://commons.wikimedia.org/wiki/File:Webysther_20160322_-_Logo_UnB_(sem_texto).svg" target="_blank">Webysther via Wikimedia Commons</a> · domínio público</span>
  </footer>

  <template id="card-template">
    <div class="card">
      <div class="card-top">
        <div class="card-info">
          <p class="materia"></p>
          <p class="professor"></p>
        </div>
        <div class="card-badges">
          <span class="badge badge-turma turma"></span>
          <span class="badge badge-horario horario"></span>
        </div>
      </div>
      <div class="card-actions">
        <input type="text" class="link-input" placeholder="Link da turma (Meet, Teams…)" />
        <button class="btn btn-save save-btn">Salvar</button>
        <a class="btn btn-enter enter-btn hidden" target="_blank">Entrar</a>
      </div>
    </div>
  </template>

  <script>
    let allTurmas = [];

    async function loadTurmas() {
      const res = await fetch('/json');
      allTurmas = await res.json();
    }

    function normalize(str) {
      return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function renderCard(item) {
      const tmpl = document.getElementById('card-template').content.cloneNode(true);
      const card = tmpl.querySelector('.card');

      card.querySelector('.materia').textContent = item.materia;
      card.querySelector('.professor').textContent = item.professor;
      card.querySelector('.turma').textContent = 'Turma ' + item.turma;
      card.querySelector('.horario').textContent = item.horario;

      const linkInput = card.querySelector('.link-input');
      const enterBtn = card.querySelector('.enter-btn');

      linkInput.value = item.link || '';

      if (item.link) {
        enterBtn.href = item.link;
        enterBtn.classList.remove('hidden');
        card.classList.add('has-link');
      }

      linkInput.addEventListener('input', () => {
        const val = linkInput.value.trim();
        if (val) {
          enterBtn.href = val;
          enterBtn.classList.remove('hidden');
        } else {
          enterBtn.classList.add('hidden');
        }
      });

      card.querySelector('.save-btn').addEventListener('click', async () => {
        const link = linkInput.value.trim();
        const body = new URLSearchParams({ materia: item.materia, turma: item.turma, link });
        await fetch('/', { method: 'POST', body });
        item.link = link;
        if (link) {
          card.classList.add('has-link');
        } else {
          card.classList.remove('has-link');
        }
      });

      return card;
    }

    function search(query) {
      const emptyState = document.getElementById('empty-state');
      const noResults = document.getElementById('no-results');
      const results = document.getElementById('results');
      const resultCount = document.getElementById('result-count');

      if (!query.trim()) {
        emptyState.classList.remove('hidden');
        noResults.classList.add('hidden');
        results.innerHTML = '';
        resultCount.style.display = 'none';
        return;
      }

      const q = normalize(query);
      const filtered = allTurmas.filter(t =>
        normalize(t.materia).includes(q) ||
        normalize(t.professor).includes(q) ||
        normalize(t.turma).includes(q) ||
        normalize(t.horario).includes(q)
      );

      emptyState.classList.add('hidden');
      results.innerHTML = '';

      if (filtered.length === 0) {
        noResults.classList.remove('hidden');
        resultCount.style.display = 'none';
        return;
      }

      noResults.classList.add('hidden');
      resultCount.style.display = 'block';
      resultCount.textContent = filtered.length === 1
        ? '1 turma encontrada'
        : `${filtered.length.toLocaleString('pt-BR')} turmas encontradas`;

      filtered.forEach(item => results.appendChild(renderCard(item)));
    }

    let debounceTimer;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => search(e.target.value), 200);
    });

    loadTurmas();
  </script>

</body>
</html>
