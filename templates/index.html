<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turmas UnB 2026.1</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 min-h-screen">

  <div class="navbar bg-primary text-primary-content shadow-md px-6">
    <div class="flex-1">
      <span class="text-xl font-bold">Turmas UnB 2026.1</span>
    </div>
    <div class="flex gap-3 text-sm">
      <a href="https://github.com/MateusLG/turmasunb" target="_blank" class="link link-hover opacity-80">GitHub</a>
      <span class="opacity-40">|</span>
      <a href="/json" class="link link-hover opacity-80">JSON</a>
    </div>
  </div>

  <main class="max-w-4xl mx-auto px-4 py-12">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold mb-1">Encontre sua turma</h1>
      <p class="text-base-content/50 text-sm">Busque por matéria, professor, código ou horário</p>
    </div>

    <div class="flex gap-2 mb-8">
      <input
        id="search"
        type="text"
        placeholder="Ex: Cálculo, Matemática Discreta, Sergio..."
        class="input input-bordered flex-1 text-base"
        autofocus
      />
    </div>

    <div id="empty-state" class="text-center py-16 text-base-content/30">
      <p class="text-4xl mb-3">🎓</p>
      <p class="text-sm">Digite para buscar entre 6478 turmas da UnB</p>
    </div>

    <div id="no-results" class="hidden text-center py-16 text-base-content/40">
      <p class="text-sm">Nenhuma turma encontrada.</p>
    </div>

    <div id="results" class="flex flex-col gap-3"></div>

  </main>

  <template id="card-template">
    <div class="card bg-base-100 shadow-sm">
      <div class="card-body py-4 px-6">
        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-1">
          <div>
            <h2 class="card-title text-base materia"></h2>
            <p class="text-sm text-base-content/60 professor"></p>
          </div>
          <div class="flex gap-2 flex-wrap sm:text-right">
            <span class="badge badge-outline turma"></span>
            <span class="badge badge-outline horario"></span>
          </div>
        </div>
        <div class="flex gap-2 mt-2">
          <input
            type="text"
            class="input input-bordered input-sm flex-1 text-sm link-input"
            placeholder="Link da turma (Meet, Teams...)"
          />
          <button class="btn btn-sm btn-success save-btn">Salvar</button>
          <a class="btn btn-sm btn-outline enter-btn hidden" target="_blank">Entrar</a>
        </div>
      </div>
    </div>
  </template>

  <script>
    let allTurmas = [];

    async function loadTurmas() {
      const res = await fetch('/json');
      allTurmas = await res.json();
    }

    function normalize(str) {
      return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function renderCard(item) {
      const tmpl = document.getElementById('card-template').content.cloneNode(true);
      const card = tmpl.querySelector('.card');

      card.querySelector('.materia').textContent = item.materia;
      card.querySelector('.professor').textContent = item.professor;
      card.querySelector('.turma').textContent = 'Turma ' + item.turma;
      card.querySelector('.horario').textContent = item.horario;

      const linkInput = card.querySelector('.link-input');
      const enterBtn = card.querySelector('.enter-btn');

      linkInput.value = item.link || '';

      if (item.link) {
        enterBtn.href = item.link;
        enterBtn.classList.remove('hidden');
      }

      linkInput.addEventListener('input', () => {
        const val = linkInput.value.trim();
        if (val) {
          enterBtn.href = val;
          enterBtn.classList.remove('hidden');
        } else {
          enterBtn.classList.add('hidden');
        }
      });

      card.querySelector('.save-btn').addEventListener('click', async () => {
        const link = linkInput.value.trim();
        const body = new URLSearchParams({ materia: item.materia, turma: item.turma, link });
        await fetch('/', { method: 'POST', body });
        item.link = link;
      });

      return card;
    }

    function search(query) {
      const emptyState = document.getElementById('empty-state');
      const noResults = document.getElementById('no-results');
      const results = document.getElementById('results');

      if (!query.trim()) {
        emptyState.classList.remove('hidden');
        noResults.classList.add('hidden');
        results.innerHTML = '';
        return;
      }

      const q = normalize(query);
      const filtered = allTurmas.filter(t =>
        normalize(t.materia).includes(q) ||
        normalize(t.professor).includes(q) ||
        normalize(t.turma).includes(q) ||
        normalize(t.horario).includes(q)
      );

      emptyState.classList.add('hidden');
      results.innerHTML = '';

      if (filtered.length === 0) {
        noResults.classList.remove('hidden');
        return;
      }

      noResults.classList.add('hidden');
      filtered.forEach(item => results.appendChild(renderCard(item)));
    }

    let debounceTimer;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => search(e.target.value), 200);
    });

    loadTurmas();
  </script>

</body>
</html>
